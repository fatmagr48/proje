---
- name: Deploy Application
  hosts: all
  tasks:
    - name: Pull Docker image
      docker_image:
        name: proje/myapp
        source: pull

    - name: Run Docker container
      docker_container:
        name: myapp_container
        image: proje/myapp
        state: started
        restart_policy: always
        published_ports:
          - "80:80"
