name: CI-CD Pipeline
on:
  push:
    branches: [ "main" ]
jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
    - name: Repo çek
      uses: actions/checkout@v3
    - name: Docker login
      run: echo "${{ secrets.DOCKER_PASS }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin
    - name: Image build
      run: docker build -t fatmagr48/myapp:latest .
    - name: Image push
      run: docker push fatmagr48/myapp:latest
    - name: Deploy
      run: ansible-playbook -i ansible/inventory.ini ansible/deploy.yml
